; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[platformio]
lib_extra_dirs =
    ../lib/Lightnet
    ../lib

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = -D DEBUG=0
lib_ldf_mode = chain+
lib_deps =
    Wire

[env:nanoatmega168]
platform = atmelavr
board = nanoatmega168
framework = arduino
build_flags = -D DEBUG=1
lib_ldf_mode = chain+
lib_deps =
    Wire

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags = -D DEBUG=1
lib_ldf_mode = chain+
lib_deps =
    Wire

[env:due]
platform = atmelsam
board = due
framework = arduino
build_flags = -D DEBUG=1
lib_ldf_mode = chain+
lib_deps =
    Wire

[env:espduino]
platform = espressif8266
board = espduino
framework = arduino
build_flags = -D DEBUG=1
upload_speed = 115200 
lib_ldf_mode = chain+
lib_deps =
    Wire

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -D DEBUG=1
upload_port = /dev/cu.SLAB_USBtoUART
lib_ldf_mode = chain+
lib_deps =
    ESP32 AnalogWrite
    Wire
