; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[platformio]
lib_extra_dirs =
    ../lib/Lightnet
    ../lib
    
[env:miniatmega328]
platform = atmelavr
board = miniatmega328
framework = arduino

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino

[env:nanoatmega168]
platform = atmelavr
board = nanoatmega168
framework = arduino

[env:due]
platform = atmelsam
board = due
framework = arduino
upload_port = COM7

[env:espduino]
platform = espressif8266
board = espduino
framework = arduino
upload_port = COM7
