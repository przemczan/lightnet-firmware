[env:panel_nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = ${common_env_data.build_flags}
lib_ldf_mode = chain+
lib_extra_dirs = ${common_env_data.lib_extra_dirs}

[env:panel_uno]
platform = atmelavr
board = uno
framework = arduino
build_flags = ${common_env_data.build_flags}
lib_ldf_mode = chain+
lib_extra_dirs = ${common_env_data.lib_extra_dirs}
