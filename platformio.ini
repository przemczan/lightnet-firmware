; PlatformIO Project Configuration File
;
; Layered layout:
;   [platformio] + platformio_local.ini  — per-machine overrides (ports)
;   [lightnet*]                          — shared build flags and lib dirs
;   [controller_*] / [panel_*]           — target-family bases (not built)
;   [env:*]                              — concrete build/upload targets
;
; LittleFS download: PlatformIO → Custom → Download Filesystem, or:
;   pio run -e controller_wemos_d1_mini_pro -t downloadfs

[platformio]
extra_configs =
    platformio_local.ini

; --- Project-wide ---

[lightnet]
lib_extra_dirs =
    lib/Lightnet
    lib/Lightnet/Core
build_flags =
    -Wno-reorder -Wno-switch

[lightnet_controller]
build_flags =
    -include src/controller.config.hpp
    -D LIGHTNET_TARGET_CONTROLLER
    -D BUFFER_LENGTH=128
    -D I2C_BUFFER_LENGTH=128

[lightnet_panel]
build_flags =
    -include src/panel.config.hpp
    -D TWI_BUFFER_SIZE=80
    -D SERIAL_RX_BUFFER_SIZE=2
    -D SERIAL_TX_BUFFER_SIZE=64

[controller_fs]
extra_scripts =
    pre:tools/fw_version.py
    tools/download_fs.py
custom_unpack_dir = data

[controller_fs_esp32]
platform_packages =
    tool-mklittlefs@tasmota/tool-mklittlefs@^4.0.0

[controller_sim]
sim_serial_baud = 230400

; --- Controller bases ---

[controller_common]
framework = arduino
board_build.filesystem = littlefs
extra_scripts = ${controller_fs.extra_scripts}
custom_unpack_dir = ${controller_fs.custom_unpack_dir}
lib_ldf_mode = chain+
lib_extra_dirs = ${lightnet.lib_extra_dirs}
build_flags = ${lightnet.build_flags} ${lightnet_controller.build_flags}
lib_deps =
    ESPAsyncWifiManager
    ESP32Async/ESPAsyncWebServer@3.11.1
    FastLED@3.3.2
lib_ignore = AsyncTCP_RP2040W
monitor_speed = 57600

[controller_esp8266_common]
extends = controller_common
platform = espressif8266
lib_deps +=
    ESP32Async/ESPAsyncTCP@2.0.0

[controller_esp32_common]
extends = controller_common
platform = espressif32
platform_packages = ${controller_fs_esp32.platform_packages}
build_flags =
    ${lightnet.build_flags}
    ${lightnet_controller.build_flags}
    -D LIGHTNET_MQTT=1
lib_deps =
    ESPAsyncWifiManager
    ESP32Async/ESPAsyncWebServer@3.11.1
    ESP32Async/AsyncTCP@3.4.10
    FastLED@3.3.2
    marvinroger/AsyncMqttClient@^0.9.0
lib_ignore = AsyncTCP_RP2040W
monitor_speed = 57600

; --- Panel bases ---

[panel_fuses_328]
board_fuses.lfuse = 0xF7
board_fuses.hfuse = 0xD8
board_fuses.efuse = 0xFC

[panel_atmega328_common]
extends = lightnet
platform = atmelavr
framework = arduino
build_flags +=
    ${lightnet_panel.build_flags}
lib_ldf_mode = chain+
lib_extra_dirs = ${lightnet.lib_extra_dirs}
extra_scripts = post:tools/generate_bin.py
lib_deps = FastLED@3.3.2
monitor_speed = 57600

; --- Native tests (pio test -e native) ---

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
    -std=gnu++14
    ${lightnet.build_flags}
    -I lib/Lightnet

; --- Controller targets ---

[env:controller_esp8266]
extends = controller_esp8266_common
board = esp12e
upload_speed = 230400

[env:controller_wemos_d1_mini_pro]
extends = controller_esp8266_common
board = d1_mini_pro
upload_speed = 460800

[env:controller_wemos_sim]
extends = env:controller_wemos_d1_mini_pro
build_flags = ${env:controller_wemos_d1_mini_pro.build_flags}
    -D SIM_MODE
    -D SIM_SERIAL_BAUD=${controller_sim.sim_serial_baud}
    -D SIM_PANELS_COUNT=15
#    -DUMM_INTEGRITY_CHECK    ; validates next/prev block links on each heap op
#    -DUMM_POISON_CHECK       ; catches writes just past/before an allocation

[env:controller_esp32]
extends = controller_esp32_common
board = esp32dev
upload_speed = 460800

[env:controller_esp32_sim]
extends = env:controller_esp32
build_flags = ${env:controller_esp32.build_flags}
    -D SIM_MODE
    -D SIM_SERIAL_BAUD=${controller_sim.sim_serial_baud}
    -D SIM_PANELS_COUNT=20

[env:controller_s2_mini]
extends = controller_esp32_common
board = lolin_s2_mini
upload_speed = 460800

[env:controller_s2_mini_sim]
extends = env:controller_s2_mini
build_flags = ${env:controller_s2_mini.build_flags}
    -D SIM_MODE
    -D SIM_SERIAL_BAUD=${controller_sim.sim_serial_baud}
    -D SIM_PANELS_COUNT=20

; --- Panel targets ---

[env:panel_atmega328p]
extends = panel_atmega328_common, panel_fuses_328
board = ATmega328P
upload_protocol = usbasp
; -D: skip chip-erase so an existing twiboot bootloader is preserved.
upload_flags = -D

[env:panel_atmega328pb]
extends = env:panel_atmega328p
board = ATmega328PB

[env:panel_atmega328_via_controller]
extends = panel_atmega328_common
board = ATmega328P
upload_protocol = custom
upload_command = $PYTHONEXE "${PROJECT_DIR}/tools/flash_panels_serial.py" $UPLOAD_PORT "${BUILD_DIR}/firmware.bin"

; --- Bootloader (one-time twiboot burn) ---

[env:atmega328p_bootloader]
extends = panel_fuses_328
platform = atmelavr
board = atmega328p
upload_protocol = usbasp
build_src_filter = -<*> +<../twiboot/main.c>
extra_scripts = post:tools/generate_bin.py
build_flags =
    -DBOOTLOADER_START=0x7000
    -DTWI_ADDRESS=0x29
    -Dfalse=0
    -Dtrue=1
    -Os
    -Wno-cpp
    -fdata-sections
    -ffunction-sections
    -Wall
    -nostartfiles
    -Wl,--relax
    -Wl,--gc-sections
    -Wl,--section-start=.text=0x7000

[env:atmega328pb_bootloader]
extends = env:atmega328p_bootloader
board = atmega328pb
