; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[common_env_data]
lib_extra_dirs = lib/Lightnet
build_flags = 
    -D DEBUG=1
build_flags_controller = 
    -D LIGHTNET_TARGET_CONTROLLER

[env:initializer_esp8266]
platform = espressif8266
board = esp12e
framework = arduino
build_flags = ${common_env_data.build_flags} ${common_env_data.build_flags_controller}
upload_speed = 115200
lib_ldf_mode = chain+
upload_port = /dev/cu.usbserial-141130
lib_extra_dirs = ${common_env_data.lib_extra_dirs}
lib_deps =
    ESPAsyncWifiManager
    ESP Async WebServer

